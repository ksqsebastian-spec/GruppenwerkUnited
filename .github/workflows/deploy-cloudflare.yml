name: Deploy zu Cloudflare Workers

# Manuell auslösbar. Empfohlener Weg ist stattdessen "Cloudflare Workers Builds"
# (Git-Integration im Dashboard). Dieser Workflow ist die optionale Alternative.
#
# Benötigte Repository-Secrets:
#   CLOUDFLARE_API_TOKEN   – Token mit "Edit Cloudflare Workers"-Berechtigung
#   CLOUDFLARE_ACCOUNT_ID  – Account-ID
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, NEXT_PUBLIC_APP_URL
#
# Laufzeit-Geheimnisse (SESSION_SECRET, CRON_SECRET, SUPABASE_SERVICE_ROLE_KEY,
# *_PASSWORD) werden NICHT hier gesetzt, sondern per `wrangler secret put` bzw. im
# Cloudflare-Dashboard.

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build + Deploy
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Abhängigkeiten installieren
        run: npm ci --legacy-peer-deps

      - name: Bauen und deployen
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          # OpenNext-Build vor dem Deploy ausführen.
          preCommands: npx opennextjs-cloudflare build
